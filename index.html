<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Dive — Altered Perception MV Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#030102;font-family:"Outfit",sans-serif;color:#e5d5d5;}
  #stage{position:fixed;inset:0;}
  canvas{display:block;}
  
  /* Glassmorphic UI container */
  #ui{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:12px;
    background:rgba(12, 6, 12, 0.75);backdrop-filter:blur(14px);
    padding:16px 20px;border-radius:8px;
    border:1px solid rgba(100, 100, 255, 0.15);
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    max-width:90vw;width:760px;z-index:10;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  .ui-row {
    display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:space-between;
  }
  
  .ui-group {
    display:flex;gap:8px;align-items:center;
  }
  
  /* Buttons & Inputs */
  button, label.btn, select {
    background:rgba(30, 15, 25, 0.6);color:#e6e6f5;
    border:1px solid rgba(100, 110, 255, 0.25);
    padding:8px 14px;border-radius:4px;font-size:12px;font-family:"Outfit",sans-serif;
    font-weight:400;cursor:pointer;letter-spacing:.04em;
    transition: all 0.2s ease;
    outline:none;
  }
  button:hover, label.btn:hover, select:hover {
    background:rgba(50, 20, 40, 0.8);
    border-color:rgba(120, 120, 255, 0.45);
    box-shadow:0 0 10px rgba(100,100,255,0.15);
  }
  button:active, select:active {
    transform: scale(0.97);
  }
  
  button.recording {
    background:rgba(20, 20, 180, 0.85);color:#fff;border-color:#3b3bff;
    box-shadow: 0 0 15px rgba(59, 59, 255, 0.4);
    animation: pulseBlue 1.5s infinite alternate;
  }
  @keyframes pulseBlue {
    from { box-shadow: 0 0 8px rgba(50,50,255,0.3); }
    to { box-shadow: 0 0 18px rgba(50,50,255,0.7); }
  }

  input[type=file]{display:none;}
  
  .slidewrap{
    display:flex;flex-direction:column;color:#aaaaca;font-size:10px;
    align-items:flex-start;gap:4px;min-width:90px;
  }
  .slidewrap span { font-weight:600; text-transform:uppercase; letter-spacing:0.05em; font-family:"Share Tech Mono",monospace; }
  input[type=range]{
    width:100%;accent-color:#66c;background:rgba(255,255,255,0.07);
    height:4px;border-radius:2px;border:none;outline:none;
  }
  
  /* (mode selectors removed) */
  
  /* Header overlays */
  #title{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    color:#bababa;letter-spacing:.5em;font-size:14px;font-weight:300;
    text-transform:uppercase;z-index:10;text-align:center;
    text-shadow:0 0 10px rgba(100,100,255,0.2);
  }
  #status{
    position:fixed;top:48px;left:50%;transform:translateX(-50%);
    color:#a0a0b0;font-size:11px;font-family:"Share Tech Mono",monospace;
    z-index:10;text-align:center;background:rgba(0,0,0,0.4);
    padding:4px 12px;border-radius:12px;border:1px solid rgba(100,100,255,0.05);
  }
  
  /* Readouts */
  #hud{
    position:fixed;top:20px;right:20px;
    display:flex;flex-direction:column;align-items:flex-end;gap:4px;
    font-family:"Share Tech Mono",monospace;font-size:11px;z-index:10;
    color:#b5b5c5;background:rgba(10,5,12,0.5);padding:8px 12px;
    border-radius:4px;border:1px solid rgba(100,100,255,0.08);
  }
  .hud-item span { color:#8080ff; }
  
  /* Recording Overlay details */
  #recInfo{
    position:fixed;top:110px;right:20px;    color:#8080ff;
    font-family:"Share Tech Mono",monospace;font-size:11px;opacity:0.95;
    z-index:10;text-align:right;background:rgba(5,5,20,0.7);
    padding:6px 10px;border-radius:4px;border:1px solid rgba(100,0,255,0.25);
    display:none;
  }
  #recInfo a{color:#ccccff;text-decoration:underline;font-weight:bold;}

  /* (renderOverlay removed) */

  /* Utilities */
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="title">Dive — Altered Perception</div>
<div id="status">システム初期化中...</div>

<div id="hud">
  <div class="hud-item">浸食度: <span id="corruptVal">0%</span></div>
  <div class="hud-item">経過時間: <span id="timeVal">0:00</span> / <span id="durationVal">33:33</span></div>
  <div class="hud-item">フレーム: <span id="frameVal">—</span></div>
  <div class="hud-item">画質: <span id="fpsVal">— fps</span></div>
</div>

<div id="recInfo"></div>

<!-- (render overlay removed) -->

<div id="stage"></div>

<div id="ui">
  <!-- Top Row: Mode Selection and Setup -->
  <div class="ui-row">
    <div class="ui-group">
      <label class="btn">音楽を読み込む<input type="file" id="fileInput" accept="audio/*"></label>
      <button id="micBtn">マイク入力</button>
    </div>
  </div>
  
  <!-- Middle Row: Context-dependent Controls -->
  <div class="ui-row">
    <!-- Real-time specific controls -->
    <div class="ui-group" id="realtimeControls">
      <button id="playBtn" style="min-width:90px;font-weight:600;">再生 / 一時停止</button>
      <button id="resetBtn">やり直し</button>
      <button id="recBtn">● 録画開始 (WebM)</button>
    </div>

    <!-- Common settings -->
    <div class="ui-group">
      <div class="slidewrap">
        <span>沈む速度 <small id="lblSink">30</small></span>
        <input type="range" id="sinkSpeed" min="0" max="100" value="30">
      </div>
      <div class="slidewrap">
        <span>崩壊速度 <small id="lblCorr">50</small></span>
        <input type="range" id="corruptSpeed" min="0" max="100" value="50">
      </div>
      <div class="slidewrap">
        <span>残像量 <small id="lblTrail">85</small></span>
        <input type="range" id="trailAmount" min="0" max="95" value="85">
      </div>
    </div>
  </div>
</div>

<!-- Three.js and FBX Loader Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.6.10/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script>
(function(){
  // --- UI Elements ---
  const statusEl = document.getElementById('status');
  const corruptValEl = document.getElementById('corruptVal');
  const timeValEl = document.getElementById('timeVal');
  const durationValEl = document.getElementById('durationVal');
  const frameValEl = document.getElementById('frameVal');
  const fpsValEl = document.getElementById('fpsVal');
  const recInfo = document.getElementById('recInfo');
  
  const playBtn = document.getElementById('playBtn');
  const recBtn = document.getElementById('recBtn');
  const resetBtn = document.getElementById('resetBtn');
  
  const sinkSpeedSlider = document.getElementById('sinkSpeed');
  const corruptSpeedSlider = document.getElementById('corruptSpeed');
  const trailSlider = document.getElementById('trailAmount');
  
  const lblSink = document.getElementById('lblSink');
  const lblCorr = document.getElementById('lblCorr');
  const lblTrail = document.getElementById('lblTrail');

  // Slider value displays
  sinkSpeedSlider.addEventListener('input', () => lblSink.textContent = sinkSpeedSlider.value);
  corruptSpeedSlider.addEventListener('input', () => lblCorr.textContent = corruptSpeedSlider.value);
  trailSlider.addEventListener('input', () => lblTrail.textContent = trailSlider.value);

  // --- Rendering & Scene Configuration ---
  const stage = document.getElementById('stage');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0f0e0d, 0.09);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 35.0, 8.5);

  const renderer = new THREE.WebGLRenderer({
    antialias: false,
    alpha: false,
    preserveDrawingBuffer: true,
    powerPreference: 'high-performance'
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  stage.appendChild(renderer.domElement);

  // Resolution and rendering targets for ping-pong feedback (trails) — PS2-style low res
  let RES_DIVISOR = 1.0;
  let rtW = Math.max(64, Math.floor(window.innerWidth / RES_DIVISOR));
  let rtH = Math.max(64, Math.floor(window.innerHeight / RES_DIVISOR));

  let sceneRT = new THREE.WebGLRenderTarget(rtW, rtH, { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter });
  let rt1 = new THREE.WebGLRenderTarget(rtW, rtH, { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter });
  let rt2 = new THREE.WebGLRenderTarget(rtW, rtH, { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter });

  // Post-processing setup
  const postScene = new THREE.Scene();
  const postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const postUniforms = {
    tDiffuse: { value: null },
    tPrevFrame: { value: null },
    uResolution: { value: new THREE.Vector2(rtW, rtH) },
    uTime: { value: 0 },
    uCorruption: { value: 0 },
    uBass: { value: 0 },
    uSurge: { value: 0 },
    uTrailAmount: { value: 0.85 }
  };

  const postMat = new THREE.ShaderMaterial({
    uniforms: postUniforms,
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy,0.0,1.0); }`,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D tDiffuse;
      uniform sampler2D tPrevFrame;
      uniform vec2 uResolution;
      uniform float uTime;
      uniform float uCorruption;
      uniform float uBass;
      uniform float uSurge;
      uniform float uTrailAmount;

      vec3 rgb2hsv(vec3 c){
        vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0);
        vec4 p=mix(vec4(c.bg,K.wz), vec4(c.gb,K.xy), step(c.b,c.g));
        vec4 q=mix(vec4(p.xyw,c.r), vec4(c.r,p.yzx), step(p.x,c.r));
        float d=q.x-min(q.w,q.y); float e=1.0e-10;
        return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)), d/(q.x+e), q.x);
      }
      vec3 hsv2rgb(vec3 c){
        vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);
        vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);
        return c.z*mix(K.xxx, clamp(p-K.xxx,0.0,1.0), c.y);
      }
      float hash(vec2 p){ return fract(sin(dot(p, vec2(12.9898,78.233)))*43758.5453); }
      float hash13(vec3 p3){ p3=fract(p3*0.1031); p3+=dot(p3, p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }

      void main(){
        vec2 uv = vUv;
        float corr = clamp(uCorruption, 0.0, 1.2);

        // Fisheye/Lens distortion (Altered perception)
        vec2 center = uv - 0.5;
        float dist = length(center);
        uv += center * dist * dist * 0.18 * (corr + uSurge * 2.0);

        // Ripple warp
        vec2 warp = vec2(
          sin(uv.y*9.0+uTime*0.9) + sin(uv.y*3.1-uTime*0.4),
          cos(uv.x*8.0+uTime*0.7) + cos(uv.x*2.6+uTime*0.5)
        ) * 0.0032 * corr;
        uv += warp;

        // Base frame color
        vec3 color = texture2D(tDiffuse, uv).rgb;

        // Chromatic Aberration
        vec2 dir = uv - 0.5;
        float aberr = 0.0015 + corr*0.005 + uBass*0.004 + uSurge*0.016;
        float rr = texture2D(tDiffuse, uv - dir*aberr).r;
        float bb = texture2D(tDiffuse, uv + dir*aberr).b;
        color = vec3(rr, color.g, bb);

        // Bit-reduction / dither noise
        float levels = 32.0;
        float threshold = hash(floor(uv*uResolution*0.5));
        color = floor(color*levels + threshold) / levels;

        // Feedback trails (hallucinatory tracers)
        vec2 prevUv = vUv;
        vec2 prevDir = prevUv - 0.5;
        float theta = 0.0025 * (1.0 + uBass * 3.0);
        float cosT = cos(theta);
        float sinT = sin(theta);
        vec2 rotatedDir = vec2(
          prevDir.x * cosT - prevDir.y * sinT,
          prevDir.x * sinT + prevDir.y * cosT
        );
        prevUv = 0.5 + rotatedDir * (0.993 - uBass * 0.008);
        vec3 prevColor = texture2D(tPrevFrame, prevUv).rgb;
        
        float blend = uTrailAmount * (0.8 + uBass * 0.16);
        color = mix(color, prevColor, clamp(blend, 0.0, 0.98));

        // HSV Shift
        vec3 hsv = rgb2hsv(color);
        hsv.x = fract(hsv.x + uTime*0.03*corr + uSurge*0.04);
        hsv.y = mix(hsv.y*0.3, min(hsv.y*2.0,1.0), corr);
        hsv.z = clamp(hsv.z*mix(1.0,1.08,corr), 0.0, 1.0);
        vec3 vivid = hsv2rgb(hsv);
        float gray = dot(color, vec3(0.299,0.587,0.114));
        vec3 sickly = mix(vec3(gray), color, 0.3) * vec3(0.78,0.85,0.8);
        color = mix(sickly, vivid, corr);

        // Neon glowing spots
        float bloom = hash(floor(uv*7.0) + floor(uTime*0.4));
        bloom = smoothstep(0.55, 0.95, bloom);
        color += vec3(0.03,0.10,0.55)*bloom*corr*(0.25+uBass*0.6)*0.6;

        // Cracks
        float c1 = hash13(vec3(floor(uv*180.0), floor(uTime*7.0)));
        float crack = smoothstep(0.985-corr*0.04, 1.0, c1);
        color -= crack * 0.4 * corr;

        // Blood stains
        float stain = smoothstep(0.92, 1.0, hash13(vec3(floor(uv*45.0), floor(uTime*3.0))));
        color += vec3(0.05,0.05,0.45) * stain * corr * 0.7;

        // Organic tissues
        float organ = smoothstep(0.55, 0.95, hash(floor(uv*3.5) + floor(uTime*0.25)));
        color += vec3(0.15,0.05,0.6) * organ * corr * (0.15 + uBass*0.4);

        // Vignette
        float pulse = 1.0 + uBass*0.06*corr + uSurge*0.05;
        float vig = smoothstep(0.98, 0.18, length(uv-0.5)*pulse);
        color *= mix(vig, 1.0, 0.4) * mix(1.0, 0.72, corr*0.4);

        // Grain
        float grain = hash(uv*uResolution + uTime*55.0) - 0.5;
        color += grain * mix(0.02, 0.075, corr);
        color += vec3(0.5,0.15,0.45) * uSurge * 0.12;

        // Drop shadow / glitch drops
        float drop = step(0.998 - corr*0.005, hash(floor(uv*220.0)+floor(uTime*15.0)));
        color *= 1.0 - drop * 0.9;

        gl_FragColor = vec4(clamp(color,0.0,1.0), 1.0);
      }
    `
  });
  postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMat));

  // Direct screen-pass renderer setup
  const screenScene = new THREE.Scene();
  const screenCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const screenUniforms = { tDiffuse: { value: null } };
  const screenMat = new THREE.ShaderMaterial({
    uniforms: screenUniforms,
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform sampler2D tDiffuse;
      void main() {
        gl_FragColor = texture2D(tDiffuse, vUv);
      }
    `
  });
  screenScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), screenMat));

  // --- Dynamic Mode Configuration ---
  function applyResolution() {
    let w = window.innerWidth;
    let h = window.innerHeight;

    camera.aspect = w / h;
    camera.updateProjectionMatrix();

    renderer.setPixelRatio(1);
    renderer.setSize(w, h, true);

    rtW = Math.max(64, Math.floor(w / RES_DIVISOR));
    rtH = Math.max(64, Math.floor(h / RES_DIVISOR));

    sceneRT.setSize(rtW, rtH);
    rt1.setSize(rtW, rtH);
    rt2.setSize(rtW, rtH);

    postUniforms.uResolution.value.set(rtW, rtH);
  }

  window.addEventListener('resize', () => {
    applyResolution();
  });

  let mouseX = 0;
  window.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5);
  });

  // --- Lighting ---
  scene.add(new THREE.AmbientLight(0x1a1828, 0.7));
  const key = new THREE.PointLight(0x6090c0, 1.4, 30); key.position.set(3, 5, 4); scene.add(key);
  const fill = new THREE.PointLight(0x2a3555, 1.0, 30); fill.position.set(-4, -1, 3); scene.add(fill);
  const underLight = new THREE.PointLight(0x0a143a, 1.2, 18); underLight.position.set(0, -3, 1); scene.add(underLight);

  // --- PS2 Low-Poly Custom Shader Modifier ---
  function addRetroBody(material) {
    material.onBeforeCompile = (shader) => {
      shader.uniforms.uSnap = { value: 1000.0 };
      shader.uniforms.uTimeU = { value: 0.0 };
      shader.uniforms.uOrganicAmp = { value: 0.0 };
      shader.uniforms.uMutation = { value: 0.0 };
      
      shader.vertexShader = 'uniform float uSnap;\nuniform float uTimeU;\nuniform float uOrganicAmp;\nuniform float uMutation;\n' + shader.vertexShader;
      
      shader.vertexShader = shader.vertexShader.replace(
        '#include <begin_vertex>',
        `
        #include <begin_vertex>
        { 
          float freq = 14.0 + uMutation * 12.0;
          float spike = sin(position.x * freq) * sin(position.y * freq) * sin(position.z * freq);
          float sharpSpike = sign(spike) * pow(abs(spike), 0.4) * uMutation * 0.15;
          
          float def = sin(position.x*7.0+uTimeU*1.4)*sin(position.y*6.0-uTimeU*1.0)*sin(position.z*8.0+uTimeU*0.8) * uOrganicAmp;
          
          transformed += normal * (def + sharpSpike); 
        }
        `
      );
      shader.vertexShader = shader.vertexShader.replace(
        '#include <project_vertex>',
        `
        #include <project_vertex>
        { 
          vec4 snapped = gl_Position;
          snapped.xyz /= snapped.w;
          snapped.xy = floor(snapped.xy * uSnap) / uSnap;
          snapped.xyz *= snapped.w;
          gl_Position = snapped; 
        }
        `
      );
      material.userData.shader = shader;
    };
  }

  // --- Materials ---
  const skinBase = new THREE.Color(0xb58a8a);
  const skinMat = new THREE.MeshStandardMaterial({
    color: skinBase.clone(), roughness: 0.75, metalness: 0.05,
    emissive: 0x0c0608, emissiveIntensity: 0.12, flatShading: true
  });
  addRetroBody(skinMat);

  const lesionMat = new THREE.MeshStandardMaterial({ 
    color: 0x060c2e, roughness: 0.45, metalness: 0.1, 
    emissive: 0x061818, emissiveIntensity: 0.7, flatShading: true 
  });
  addRetroBody(lesionMat);
  
  const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xdae2a8, roughness: 0.2, emissive: 0x4f5228, emissiveIntensity: 0.35, flatShading: true });
  const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x000010, emissive: 0x1144ff, emissiveIntensity: 1.8, flatShading: true });

  // --- Loader Setup for Attached Model ---
  let fbxModel = null;
  let mixer = null;
  const bonesMap = {};
  const defaultBonePositions = {};
  let tendrilConnectors = [];

  const textureLoader = new THREE.TextureLoader();
  const baseColorTex = textureLoader.load('ps2-psx-lowpoly-character/textures/Base_Color.png');
  const bodyColorTex = textureLoader.load('ps2-psx-lowpoly-character/textures/Body_Base_color.png');

  // Texture filtering for smooth look
  baseColorTex.minFilter = THREE.LinearFilter;
  baseColorTex.magFilter = THREE.LinearFilter;
  bodyColorTex.minFilter = THREE.LinearFilter;
  bodyColorTex.magFilter = THREE.LinearFilter;

  // Search rig hierarchy for skeleton bones (case-insensitive substring checks)
  function mapBones(object) {
    let hasBones = false;
    object.traverse(child => {
      if (child.isBone) hasBones = true;
    });

    if (hasBones) {
      object.traverse(child => {
        if (child.isBone) {
          const name = child.name.toLowerCase();
          
          if (name.includes('head')) bonesMap.head = child;
          else if (name.includes('neck')) bonesMap.neck = child;
          else if (name.includes('hips') || name.includes('pelvis') || name.includes('root')) bonesMap.hips = child;
          else if (name.includes('spine2') || name.includes('chest') || name.includes('spine1')) bonesMap.chest = child;
          else if (name.includes('spine')) bonesMap.spine = child;
          
          else if (name.includes('leftshoulder') || name.includes('shoulder_l') || name.includes('shoulder.l')) bonesMap.shoulderL = child;
          else if (name.includes('rightshoulder') || name.includes('shoulder_r') || name.includes('shoulder.r')) bonesMap.shoulderR = child;
          
          else if (name.includes('leftarm') || name.includes('upperarm_l') || name.includes('uparm.l') || name.includes('upper_arm.l')) bonesMap.armL = child;
          else if (name.includes('rightarm') || name.includes('upperarm_r') || name.includes('uparm.r') || name.includes('upper_arm.r')) bonesMap.armR = child;
          
          else if (name.includes('leftforearm') || name.includes('forearm_l') || name.includes('forearm.l') || name.includes('lowarm.l')) bonesMap.forearmL = child;
          else if (name.includes('rightforearm') || name.includes('forearm_r') || name.includes('forearm.r') || name.includes('lowarm.r')) bonesMap.forearmR = child;
          
          else if (name.includes('lefthand') || name.includes('hand_l') || name.includes('hand.l')) bonesMap.handL = child;
          else if (name.includes('righthand') || name.includes('hand_r') || name.includes('hand.r')) bonesMap.handR = child;
          
          else if (name.includes('leftupleg') || name.includes('thigh_l') || name.includes('thigh.l') || name.includes('upleg.l')) bonesMap.thighL = child;
          else if (name.includes('rightupleg') || name.includes('thigh_r') || name.includes('thigh.r') || name.includes('upleg.r')) bonesMap.thighR = child;
          
          else if (name.includes('leftleg') || name.includes('calf_l') || name.includes('calf.l') || name.includes('shin.l') || name.includes('lowerleg.l')) bonesMap.shinL = child;
          else if (name.includes('rightleg') || name.includes('calf_r') || name.includes('calf.r') || name.includes('shin.r') || name.includes('lowerleg.r')) bonesMap.shinR = child;
          
          else if (name.includes('leftfoot') || name.includes('foot_l') || name.includes('foot.l')) bonesMap.footL = child;
          else if (name.includes('rightfoot') || name.includes('foot_r') || name.includes('foot.r')) bonesMap.footR = child;
        }
      });
    } else {
      // Fallback: if FBX consists of separate mesh nodes instead of a skeleton
      object.traverse(child => {
        if (child.isMesh) {
          const name = child.name.toLowerCase();
          if (name.includes('head') || name.includes('face')) bonesMap.head = child;
          else if (name.includes('neck')) bonesMap.neck = child;
          else if (name.includes('torso') || name.includes('chest') || name.includes('body') || name.includes('hips')) bonesMap.hips = child;
          else if (name.includes('leftarm') || name.includes('arm_l') || name.includes('l_arm')) bonesMap.armL = child;
          else if (name.includes('rightarm') || name.includes('arm_r') || name.includes('r_arm')) bonesMap.armR = child;
          else if (name.includes('leftleg') || name.includes('leg_l') || name.includes('l_leg')) bonesMap.thighL = child;
          else if (name.includes('rightleg') || name.includes('leg_r') || name.includes('r_leg')) bonesMap.thighR = child;
        }
      });
    }
    console.log("Mapped bones:", Object.keys(bonesMap));
  }

  // --- Glowing Elastic Tendrils (Veins connecting fragmented joints) ---
  class TendrilConnector {
    constructor(objA, objB, color = 0x2255ff) {
      this.objA = objA;
      this.objB = objB;
      this.pointsCount = 12;
      
      const positions = new Float32Array(this.pointsCount * 3);
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      
      const material = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.0, 
        linewidth: 1
      });
      
      this.line = new THREE.Line(geometry, material);
      scene.add(this.line);
      this.seed = Math.random() * 100;
    }
    
    update(t, bass, corr) {
      const posA = new THREE.Vector3();
      const posB = new THREE.Vector3();
      
      this.objA.getWorldPosition(posA);
      this.objB.getWorldPosition(posB);
      
      const posAttr = this.line.geometry.attributes.position;
      
      for (let i = 0; i < this.pointsCount; i++) {
        const alpha = i / (this.pointsCount - 1);
        const p = new THREE.Vector3().lerpVectors(posA, posB, alpha);
        
        // Add organic wriggling wave perpendicular to connection path
        if (alpha > 0 && alpha < 1) {
          const freq = 14.0;
          const amp = (0.05 + corr * 0.15 + bass * 0.1) * Math.sin(alpha * Math.PI);
          const wave = Math.sin(t * 8.0 + alpha * freq + this.seed) * amp;
          const wave2 = Math.cos(t * 6.5 + alpha * freq + this.seed) * amp;
          
          const dir = new THREE.Vector3().subVectors(posB, posA).normalize();
          const tangent = Math.abs(dir.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
          const normal = new THREE.Vector3().crossVectors(dir, tangent).normalize();
          const binormal = new THREE.Vector3().crossVectors(dir, normal).normalize();
          
          p.addScaledVector(normal, wave);
          p.addScaledVector(binormal, wave2);
        }
        posAttr.setXYZ(i, p.x, p.y, p.z);
      }
      
      posAttr.needsUpdate = true;
      
      const targetOpacity = (0.15 + corr * 0.8) * (0.6 + bass * 0.4);
      this.line.material.opacity = targetOpacity;
      this.line.material.color.setHSL(0.6 + Math.sin(t*2.0)*0.03, 1.0, 0.4 + bass * 0.2);
    }
  }

    fbx.traverse(child => {
      if (child.isMesh) {
        // Keep original texture if the FBX already has one with a map
        const origMat = child.material;
        let hasOrigTex = false;
        if (origMat) {
          const mats = Array.isArray(origMat) ? origMat : [origMat];
          hasOrigTex = mats.some(m => m.map !== null && m.map !== undefined);
        }

        if (hasOrigTex) {
          // FBX has its own textures - keep them, just add retro shader
          const mats = Array.isArray(origMat) ? origMat : [origMat];
          mats.forEach(m => {
            m.flatShading = true;
            m.emissive = new THREE.Color(0x0c0608);
            m.emissiveIntensity = 0.12;
            addRetroBody(m);
          });
        } else {
          // No textures - apply our external textures
          const name = child.name.toLowerCase();
          const matName = origMat ? (Array.isArray(origMat) ? origMat[0].name.toLowerCase() : origMat.name.toLowerCase()) : '';
          
          let tex = bodyColorTex;
          if (name.includes('head') || name.includes('face') || name.includes('hair') || name.includes('eye') ||

            roughness: 0.82,
            metalness: 0.05,
            flatShading: true,
            emissive: 0x0c0608,
            emissiveIntensity: 0.12
          });
          addRetroBody(mat);
          child.material = mat;
        }
      }
    });
    
    initializeTendrils();
    
    // Setup animation mixer
    if (fbx.animations && fbx.animations.length > 0) {
      mixer = new THREE.AnimationMixer(fbx);
      const action = mixer.clipAction(fbx.animations[0]);
      action.play();
      statusEl.textContent = "モデル＆アニメーションをロード完了。";
    } else {
      statusEl.textContent = "モデルをロード完了。（アニメーションなし）";

    `,
    fragmentShader: `
      uniform float uTime; uniform float uMid; uniform float uCorruption;
      varying float vHeight; varying vec3 vPos;
      vec3 hsl2rgb(vec3 c){

  // --- Radical-2 FFT Implementation ---
  function bitReverse(x, bits) {
    let y = 0;
    let temp = x;
    for (let i = 0; i < bits; i++) {
      y = (y << 1) | (temp & 1);
      temp >>= 1;
    }
    return y;
  }

  function fftIterative(re, im) {
    const n = re.length;
    const bits = Math.round(Math.log2(n));
    
    for (let i = 0; i < n; i++) {
      const j = bitReverse(i, bits);
      if (i < j) {
        let temp = re[i]; re[i] = re[j]; re[j] = temp;
        temp = im[i]; im[i] = im[j]; im[j] = temp;
      }
    }
    
    for (let len = 2; len <= n; len <<= 1) {
      const angle = -2 * Math.PI / len;
      const wlen_re = Math.cos(angle);
      const wlen_im = Math.sin(angle);
      for (let i = 0; i < n; i += len) {
        let w_re = 1;
        let w_im = 0;
        const halfLen = len >> 1;
        for (let j = 0; j < halfLen; j++) {
          const u_re = re[i + j];
          const u_im = im[i + j];
          const v_re = re[i + j + halfLen] * w_re - im[i + j + halfLen] * w_im;
          const v_im = re[i + j + halfLen] * w_im + im[i + j + halfLen] * w_re;
          re[i + j] = u_re + v_re;
          im[i + j] = u_im + v_im;
          re[i + j + halfLen] = u_re - v_re;
          im[i + j + halfLen] = u_im - v_im;
          const next_w_re = w_re * wlen_re - w_im * wlen_im;
          const next_w_im = w_re * wlen_im + w_im * wlen_re;
          w_re = next_w_re;
          w_im = next_w_im;
        }
      }
    }
  }

  let fftRe = new Float32Array(512);
  let fftIm = new Float32Array(512);

  class AudioAnalyserExtractor {
    constructor(audioBuffer, fftSize = 512) {
      this.buffer = audioBuffer;
      this.fftSize = fftSize;
      this.sampleRate = audioBuffer.sampleRate;
      
      const channels = audioBuffer.numberOfChannels;
      this.monoData = new Float32Array(audioBuffer.length);
      if (channels === 1) {
        this.monoData.set(audioBuffer.getChannelData(0));
      } else {
        const ch0 = audioBuffer.getChannelData(0);
        const ch1 = audioBuffer.getChannelData(1);
        for (let i = 0; i < audioBuffer.length; i++) {
          this.monoData[i] = (ch0[i] + ch1[i]) * 0.5;
        }
      }
      
      this.window = new Float32Array(fftSize);
      for (let i = 0; i < fftSize; i++) {
        this.window[i] = 0.5 * (1 - Math.cos((2 * Math.PI * i) / (fftSize - 1))); // Hann window
      }
    }
    
    getByteFrequencyData(time, outArray) {
      const centerSample = Math.floor(time * this.sampleRate);
      const startSample = centerSample - this.fftSize / 2;
      
      for (let i = 0; i < this.fftSize; i++) {
        const idx = startSample + i;
        if (idx >= 0 && idx < this.monoData.length) {
          fftRe[i] = this.monoData[idx] * this.window[i];
        } else {
          fftRe[i] = 0;
        }
        fftIm[i] = 0;
      }
      
      fftIterative(fftRe, fftIm);
      
      const minDb = -90;
      const maxDb = -20;
      const range = maxDb - minDb;
      const numBins = this.fftSize / 2;
      
      for (let i = 0; i < numBins; i++) {
        const r = fftRe[i] / this.fftSize;
        const j = fftIm[i] / this.fftSize;
        const mag = Math.sqrt(r * r + j * j) * 2;
        
        const db = mag > 0 ? 20 * Math.log10(mag) : -200;
        let val = Math.round(((db - minDb) / range) * 255);
        if (val < 0) val = 0;
        if (val > 255) val = 255;
        outArray[i] = val;
      }
    }
  }

  // --- Auto Load 1st full.wav if present ---

      statusEl.textContent = "自動：アルバム音声をデコード中...";
      
      decodedAudioBuffer = await audioCtx.decodeAudioData(ab);
      audioExtractor = new AudioAnalyserExtractor(decodedAudioBuffer, 512);
      trackDuration = decodedAudioBuffer.duration;
      recomputeBaseRate();
      
      // Setup real-time audio player & routing for auto-loaded audio file

  // --- WebM Local Real-time Recorder ---
  let mediaRec = null, recChunks = [], recStartT = 0, recTimer = null;
  function setRecInfo(html) { 
    recInfo.innerHTML = html; 
    recInfo.style.display = html ? 'block' : 'none'; 
  }
  
  recBtn.addEventListener('click', () => {
    if (mediaRec && mediaRec.state === 'recording') { mediaRec.stop(); return; }
    try {
      const stream = renderer.domElement.captureStream(60);
      if (audioCtx) {
        try {
          const dest = audioCtx.createMediaStreamDestination();
          analyser.connect(dest);
          dest.stream.getAudioTracks().forEach(tr => stream.addTrack(tr));
        } catch (_) {}
      }
      const mime = (window.MediaRecorder && MediaRecorder.isTypeSupported('video/webm;codecs=vp9'))
        ? 'video/webm;codecs=vp9'
        : (MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8' : 'video/webm');
        
      mediaRec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 12000000 });
      recChunks = [];
      mediaRec.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
      mediaRec.onstop = () => {
        const blob = new Blob(recChunks, { type: mime });
        const url = URL.createObjectURL(blob);
        const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
        setRecInfo(`REC ■ ${sizeMB} MB · <a href="${url}" download="mv_preview_${Date.now()}.webm">録画をダウンロード</a>`);
        recBtn.textContent = '● 録画開始 (WebM)'; 
        recBtn.classList.remove('recording');
        if (recTimer) { clearInterval(recTimer); recTimer = null; }
      };
      
      mediaRec.start(250);
      recStartT = performance.now();
      recBtn.textContent = '■ 録画停止'; 
      recBtn.classList.add('recording');
      setRecInfo('REC ● 録画中 · 0:00');
      
      // Reset visual timeline upon recording start
      playTime = 0;
      
      recTimer = setInterval(() => {
        const s = Math.floor((performance.now() - recStartT) / 1000);
        setRecInfo(`REC ● 録画中 · ${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`);
      }, 500);
    } catch (err) {

  });

  // --- Calculations for Onset Detection ---
  let fastEnv = 0, slowEnv = 0, surgeEnergy = 0;
  let hueAccum = 0;
  let corruptionRaw = 0;
  let splashTriggered = false;

  function getAudioLevels(customFreqData) {
    let source = customFreqData || freqData;
    if (source) {
      const n = source.length;
      let bass = 0, mid = 0, treble = 0;
      const bassEnd = Math.floor(n * 0.12), midEnd = Math.floor(n * 0.5);
      
      for (let i = 0; i < bassEnd; i++) bass += source[i];
      for (let i = bassEnd; i < midEnd; i++) mid += source[i];
      for (let i = midEnd; i < n; i++) treble += source[i];
      
      bass /= (bassEnd * 255); 
      mid /= ((midEnd - bassEnd) * 255); 
      treble /= ((n - midEnd) * 255);
      
      // Dynamic expansion to handle compressed -8.6 LUFS audio
      bass = Math.pow(Math.max(0, (bass - 0.35) / 0.65), 2.8);
      mid = Math.pow(Math.max(0, (mid - 0.35) / 0.65), 2.8);
      treble = Math.pow(Math.max(0, (treble - 0.30) / 0.70), 2.8);
      
      return { bass, mid, treble };
    }
    return { bass: 0, mid: 0, treble: 0 };
  }

  function updateRetroUniforms(mat, t, a, mut) {
    if (mat.userData.shader) {
      mat.userData.shader.uniforms.uTimeU.value = t;
      mat.userData.shader.uniforms.uOrganicAmp.value = a;
      mat.userData.shader.uniforms.uMutation.value = mut;
      // Dynamic snap: smooth at first, gradually becomes low-poly
      const snap = THREE.MathUtils.lerp(1000.0, 80.0, Math.pow(mut, 2.5));
      mat.userData.shader.uniforms.uSnap.value = snap;
    }
  }

  function getProgress(time) {
    if (audioEl && isFinite(audioEl.duration) && audioEl.duration > 0) {
      return Math.min(1.0, time / audioEl.duration);
    }
    return Math.min(1.0, time / 2013);
  }

  // --- Render Frame Function ---
  function drawFrame(time, dt, customFreqData) {
    const { bass, mid, treble } = getAudioLevels(customFreqData);
    const audioEnergy = (bass + mid + treble) / 3;

    // Detect transients
    fastEnv += (audioEnergy - fastEnv) * Math.min(1, dt * 9.0);
    slowEnv += (audioEnergy - slowEnv) * Math.min(1, dt * 0.55);
    const onset = Math.max(0, fastEnv - slowEnv) * 3.4;
    surgeEnergy = Math.max(onset, surgeEnergy - dt * 1.1);

    const progress = getProgress(time);

    // Dynamic wave curves for visual cycles
    const wave1 = Math.sin(progress * Math.PI * 2 * 2.5 + 0.6) * 0.5 + 0.5;
    const wave2 = Math.sin(progress * Math.PI * 2 * 6.0 + 2.1) * 0.5 + 0.5;
    const variety = wave1 * 0.6 + wave2 * 0.4;

    const rateMul = corruptSpeedSlider.value / 50;
    corruptionRaw += dt * (baseRate * rateMul * 0.85 + audioEnergy * 0.005 + onset * 0.006);
    const corr = Math.min(corruptionRaw, 1.2);
    const corrVis = Math.min(corruptionRaw, 1.0);
    
    corruptValEl.textContent = Math.round(corrVis * 100) + "%" + (corruptionRaw > 1.0 ? " ++" : "");
    hueAccum += dt * 0.045 * (0.55 + variety * 0.9);

    // Fog colors
    const fogA = new THREE.Color(0x0f0e0d); // sky misty grey
    const fogB = new THREE.Color(0x060103); // deep dark crimson-black underwater

    // Track targets dynamically (camera centering)
    const targetLookAt = new THREE.Vector3();
    if (fbxModel) {
      if (bonesMap.hips) {
        bonesMap.hips.getWorldPosition(targetLookAt);
      } else {
        fbxModel.getWorldPosition(targetLookAt);
      }
      targetLookAt.y += 0.42; // Center on chest/hips
    } else {
      targetLookAt.set(0, 3.0, 0);
    }
    
    // Dive Sequence Transitions (splash at 2.5s)
    if (time < 2.5) {
      const ratio = time / 2.5;
      camera.position.y = 35.0 - Math.pow(ratio, 2) * 29.0; // Accelerating dive
      camera.position.x = 0;
      camera.position.z = 0.1; // Straight down plummet
      camera.lookAt(targetLookAt);
      
      scene.fog.color.copy(fogA);
      scene.fog.density = 0.06;
      splashTriggered = false;
      bubbleMat.opacity = 0.0;
    } else {
      // 2.5 seconds or later (Underwater space)
      if (!splashTriggered) {
        triggerSplash();
        splashTriggered = true;
        // Inject huge transient burst
        surgeEnergy = 1.0;
      }
      
      const underwaterTime = time - 2.5;
      // Camera sinks slowly towards y = 0
      const targetY = 6.0 - Math.min(underwaterTime * 0.35, 6.0) + Math.sin(underwaterTime * 0.2) * 0.3;
      camera.position.y += (targetY - camera.position.y) * 0.05;
      camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.02;
      
      // Pull camera back from 0.1 to 7.5 to pan out and face the model
      const targetZ = 7.5 + Math.sin(underwaterTime * 0.05) * 1.0;
      camera.position.z += (targetZ - camera.position.z) * 0.05;
      
      // Look directly at the model center (Torso/Hips) at all times
      camera.lookAt(targetLookAt);

      scene.fog.color.copy(fogA).lerp(fogB, Math.min(underwaterTime * 0.4, 1.0));
      scene.fog.density = 0.12 + Math.min(corr, 1.0) * 0.02 + variety * Math.min(corr, 1.0) * 0.015;
    }

    // Camera field of view expands on transients
    camera.fov = 50 + surgeEnergy * 6.5;
    camera.updateProjectionMatrix();

    // Lighting updates
    key.color.setHSL(THREE.MathUtils.lerp(0.58, hueAccum % 1, Math.min(corr, 1)), THREE.MathUtils.lerp(0.15, 0.8, Math.min(corr,1)), 0.55);
    fill.color.setHSL(THREE.MathUtils.lerp(0.52, (hueAccum + 0.5) % 1, Math.min(corr, 1)), THREE.MathUtils.lerp(0.25, 0.85, Math.min(corr,1)), 0.4);
    key.intensity = 1.1 + bass * 1.6 + Math.min(corr, 1) * 1.2 + surgeEnergy * 1.2;
    fill.intensity = 0.9 + mid * 1.2;
    underLight.intensity = 0.6 + corr * 1.8 + bass * 0.6 + surgeEnergy * 0.8;

    // Sea displacement uniforms
    seaUniforms.uTime.value = time; 
    seaUniforms.uBass.value = bass; 
    seaUniforms.uMid.value = mid;
    seaUniforms.uCorruption.value = Math.min(corr, 1.0);

    // --- Model color/rot decays (Altered perception mutations) ---
    const normalSkin = new THREE.Color(0x8a9ab5);
    const deadSkin = new THREE.Color(0x101218);
    skinMat.color.copy(normalSkin).lerp(deadSkin, progress);
    
    skinMat.emissive.setHSL(0.6, 1.0, progress * 0.35 + bass * 0.15);
    skinMat.emissiveIntensity = 0.1 + progress * 1.6 + bass * 0.4;
    
    updateRetroUniforms(skinMat, time, Math.min(corr, 1.2) * 0.045 + bass * 0.015, progress);
    updateRetroUniforms(lesionMat, time, Math.min(corr, 1.2) * 0.06 + bass * 0.025, progress);

    // --- Dismembered / Fragmented FBX Model Bone-offsetting ---
    if (fbxModel) {
      const sinkSpeed = sinkSpeedSlider.value / 1000;
      fbxModel.position.y -= dt * (sinkSpeed * 4.5) * (1.0 + bass * 1.1);
      fbxModel.rotation.z = Math.PI / 2;

      // Irreversible separation (parts drift far apart into deep space)
      const separation = progress * 1.4;

      for (const key in bonesMap) {
        const bone = bonesMap[key];
        const defPos = defaultBonePositions[key];
        if (bone && defPos) {
          const amount = separation * 0.5 + corr * 0.15 + bass * 0.08;
          let offset = new THREE.Vector3();
          
          if (key === 'head') offset.set(0, amount * 1.6, 0);
          else if (key === 'neck') offset.set(0, amount * 0.8, 0);
          else if (key === 'armL') offset.set(-amount * 1.2, 0, 0);
          else if (key === 'armR') offset.set(amount * 1.2, 0, 0);
          else if (key === 'forearmL') offset.set(-amount * 1.5, 0, 0);
          else if (key === 'forearmR') offset.set(amount * 1.5, 0, 0);
          else if (key === 'handL') offset.set(-amount * 1.8, 0, 0);
          else if (key === 'handR') offset.set(amount * 1.8, 0, 0);
          else if (key === 'thighL') offset.set(-amount * 0.8, -amount * 0.8, 0);
          else if (key === 'thighR') offset.set(amount * 0.8, -amount * 0.8, 0);
          else if (key === 'shinL') offset.set(0, -amount * 1.2, 0);
          else if (key === 'shinR') offset.set(0, -amount * 1.2, 0);
          else if (key === 'footL') offset.set(0, -amount * 1.5, 0);
          else if (key === 'footR') offset.set(0, -amount * 1.5, 0);
          
          bone.position.copy(defPos).add(offset);
        }
      }
    }

    // Update dynamic tendril connectors
    tendrilConnectors.forEach(tc => tc.update(time, bass, corr));

    // --- Dynamic Spawning eye swarm observer swarm ---
    const activeCount = Math.max(4, Math.floor(progress * MAX_EYES));
    
    floatingEyes.forEach((eye, index) => {
      if (index < activeCount) {
        eye.visible = true;
        
        const scaleFactor = Math.min(1.0, (progress * MAX_EYES) - index);
        eye.scale.setScalar(scaleFactor);
        
        const ud = eye.userData;
        const theta = time * ud.speed + ud.seedX;
        const phi = Math.sin(time * 0.4 + ud.seedY) * 1.1;
        
        const hPos = new THREE.Vector3();
        if (fbxModel) {
          fbxModel.getWorldPosition(hPos);
        } else {
          hPos.set(0, 3.0, 0);
        }
        
        const r = ud.orbitRadius * (1.0 + bass * 0.35) * (0.9 + progress * 0.6);
        
        eye.position.x = hPos.x + r * Math.sin(theta) * Math.cos(phi);
        eye.position.y = hPos.y + r * Math.sin(theta) * Math.sin(phi);
        eye.position.z = hPos.z + r * Math.cos(theta);
        
        eye.lookAt(camera.position);
        eye.children[1].material.emissiveIntensity = 1.3 + bass * 1.4 + corr * 1.0;
      } else {
        eye.visible = false;
      }
    });

    // Mouth animation (follows head position if present)
    const mouthOpen = 0.5 + Math.abs(Math.sin(time * 0.6)) * 0.5 + bass * 1.2 + Math.min(corr, 1.0) * 0.8;
    mouthDeep.scale.set(1, Math.min(1.6, mouthOpen), 1);
    
    if (bonesMap.head) {
      const headPos = new THREE.Vector3();
      bonesMap.head.getWorldPosition(headPos);
      
      // Place mouth elements near the face
      mouthClosed.position.copy(headPos).add(new THREE.Vector3(0, -0.05, 0.08));
      mouthDeep.position.copy(headPos).add(new THREE.Vector3(0, -0.05, 0.09));
      mouthClosed.lookAt(camera.position);
      mouthDeep.lookAt(camera.position);
      mouthClosed.visible = true;
      mouthDeep.visible = true;
    } else {
      mouthClosed.visible = false;
      mouthDeep.visible = false;
    }

    // Lesions emerging
    const lesionEmerge = THREE.MathUtils.smoothstep(corr, 0.12, 0.55);
    lesions.forEach(m => {
      const ph = m.userData.phase + time * 0.7;
      m.scale.setScalar(lesionEmerge * (1.0 + Math.sin(ph) * 0.18 * (0.3 + corr)));
      
      // Position lesions near hips/torso
      const hPos = new THREE.Vector3();
      if (bonesMap.hips) bonesMap.hips.getWorldPosition(hPos);
      else if (fbxModel) fbxModel.getWorldPosition(hPos);
      else hPos.set(0,3,0);
      
      m.position.set(
        hPos.x + Math.sin(ph)*0.25,
        hPos.y + Math.cos(ph*0.8)*0.25,
        hPos.z + Math.sin(ph*0.4)*0.25
      );
      m.visible = lesionEmerge > 0.01;
    });

    // Organic chunk debris floating
    const chunkEmerge = THREE.MathUtils.smoothstep(corr, 0.05, 0.45);
    looseChunks.forEach(m => {
      const ph = m.userData.phase + time * 0.5;
      m.position.y += 0.015 * Math.sin(ph) * (1.0 + corr * 1.5) * chunkEmerge;
      m.position.x += 0.012 * Math.cos(ph * 0.7) * chunkEmerge;
      m.rotation.x += 0.01 * (1.0 + corr);
      m.rotation.y += 0.013 * (1.0 + corr);
      m.scale.setScalar(chunkEmerge * (1.0 + corr * 0.4 + Math.sin(ph) * 0.05));
      m.visible = chunkEmerge > 0.01;
    });

    // Drool update (placed at head position)
    const dPos = drool.geometry.attributes.position;
    const headPos = new THREE.Vector3();
    if (bonesMap.head) bonesMap.head.getWorldPosition(headPos);
    else headPos.set(0,3.8,0);

    for (let i = 0; i < droolCount; i++) {
      let yy = dPos.array[i * 3 + 1];
      yy -= droolSpd[i] * 0.02 * (1.0 + bass * 1.5);
      
      // Draw dynamic drool dripping from head
      dPos.array[i * 3] = headPos.x + (Math.random() - 0.5) * 0.02;
      dPos.array[i * 3 + 2] = headPos.z + 0.05;
      
      if (yy < headPos.y - 1.2) { 
        yy = headPos.y - 0.05; 
      }
      dPos.array[i * 3 + 1] = yy;
    }
    dPos.needsUpdate = true;
    droolMat.opacity = 0.4 + bass * 0.5 + Math.min(corr, 1.0) * 0.4;

    // Organic background dust update
    const posAttr = bgParticles.geometry.attributes.position;
    for (let i = 0; i < PCOUNT; i++) {
      let y = posAttr.array[i * 3 + 1];
      y += 0.016 * speeds[i] * (1.0 + treble * 1.0);
      if (y > 16.0) y = -16.0;
      posAttr.array[i * 3 + 1] = y;
    }
    posAttr.needsUpdate = true;
    pMat.color.setHSL(THREE.MathUtils.lerp(0.06, hueAccum % 1, Math.min(corr, 1.0)), THREE.MathUtils.lerp(0.2, 0.75, Math.min(corr, 1.0)), 0.55);
    pMat.opacity = 0.3 + Math.min(corr, 1.0) * 0.35 + treble * 0.15 + surgeEnergy * 0.15;

    // Update Splash/Bubble particles
    if (splashTriggered && bubbleMat.opacity > 0.01) {
      const bPosAttr = bubblePoints.geometry.attributes.position;
      for (let i = 0; i < BCOUNT; i++) {
        let bx = bPosAttr.getX(i);
        let by = bPosAttr.getY(i);
        let bz = bPosAttr.getZ(i);
        
        if (by > -50.0) {
          bx += bubbleVels[i * 3] * dt;
          by += bubbleVels[i * 3 + 1] * dt;
          bz += bubbleVels[i * 3 + 2] * dt;
          
          bubbleVels[i * 3 + 1] -= dt * 9.8; 
          
          bPosAttr.setXYZ(i, bx, by, bz);
        }
      }
      bPosAttr.needsUpdate = true;
      bubbleMat.opacity -= dt * 0.15; 
    }

    // --- Shockwave Rings update ---
    if (onset > 0.3 && time - lastRingTime > 0.3) {
      triggerRing(time);
    }
    rings.forEach(r => {
      if (r.active) {
        r.scale += dt * 6.0 * (1.0 + bass * 2.0);
        r.mesh.scale.setScalar(r.scale);
        r.mesh.material.opacity = Math.max(0, 0.7 - r.scale * 0.08) * Math.min(corr + 0.1, 1.0);
        if (r.scale > 12) { r.active = false; r.mesh.visible = false; }
      }
    });

    // --- Wireframe Geometric Polyhedra update ---
    const geoActiveCount = Math.floor(progress * MAX_GEOS * 0.7);
    geoShapes.forEach((g, i) => {
      if (i < geoActiveCount) {
        g.mesh.visible = true;
        const sp = Math.min(1.0, (progress * MAX_GEOS * 0.7 - i) * 0.3);
        g.spawnProgress = Math.min(1.0, g.spawnProgress + dt * 0.5);
        
        const t2 = time * g.speed + g.seed;
        const r = g.orbitR * (1.0 + bass * 0.3) * g.spawnProgress;
        g.mesh.position.x = Math.sin(t2) * r;
        g.mesh.position.y = 3.0 + Math.cos(t2 * 0.7) * r * 0.5 + Math.sin(t2 * 0.3) * 1.5;
        g.mesh.position.z = Math.cos(t2) * r;
        
        g.mesh.rotation.x += dt * (0.3 + treble * 0.8);
        g.mesh.rotation.y += dt * (0.2 + bass * 0.5);
        g.mesh.rotation.z += dt * 0.15;
        
        g.mat.opacity = sp * 0.35 * (0.5 + bass * 0.5 + corr * 0.3);
        g.mat.color.setHSL((hueAccum + i * 0.05) % 1, 0.85, 0.45 + bass * 0.15);
        g.mesh.scale.setScalar(sp * (1.0 + corr * 0.3));
      } else {
        g.mesh.visible = false;
      }
    });

    // --- Vertical Light Beams update ---
    const beamActive = Math.floor(progress * beamCount);
    beams.forEach((b, i) => {
      if (i < beamActive) {
        b.mesh.visible = true;
        const phase = Math.sin(time * 0.5 + b.seed) * 0.5 + 0.5;
        b.mat.opacity = phase * (0.15 + bass * 0.3 + surgeEnergy * 0.25) * Math.min(corr + 0.15, 1.0);
        b.mat.color.setHSL((hueAccum * 0.7 + i * 0.12) % 1, 0.9, 0.5);
        b.mesh.position.y = Math.sin(time * 0.3 + b.seed) * 3;
        b.mesh.scale.x = 1.0 + bass * 3.0 + surgeEnergy * 2.0;
        b.mesh.scale.z = b.mesh.scale.x;
      } else {
        b.mesh.visible = false;
      }
    });

    // --- Horizontal Light Sheets update ---
    const sheetActive = Math.floor(progress * sheetCount * 1.5);
    sheets.forEach((s, i) => {
      if (i < sheetActive) {
        s.mesh.visible = true;
        const wave = Math.sin(time * 0.2 + s.seed + i * 1.5) * 0.5 + 0.5;
        s.mat.opacity = wave * 0.08 * (0.3 + mid * 0.7 + corr * 0.4);
        s.mat.color.setHSL((hueAccum * 0.5 + i * 0.25) % 1, 0.75, 0.35);
        s.mesh.position.y = s.baseY + Math.sin(time * 0.15 + s.seed) * 2;
        s.mesh.rotation.z = time * 0.02 * (i % 2 === 0 ? 1 : -1);
      } else {
        s.mesh.visible = false;
      }
    });

    // --- Spiral Vortex Particles update ---
    const vortexOpacity = THREE.MathUtils.smoothstep(corr, 0.05, 0.4) * 0.6;
    vortexMat.opacity = vortexOpacity * (0.3 + bass * 0.5 + surgeEnergy * 0.3);
    vortexMat.color.setHSL((hueAccum * 1.3) % 1, 0.85, 0.5);
    const vPos = vortexPoints.geometry.attributes.position;
    for (let i = 0; i < vortexCount; i++) {
      let angle = vPos.array[i * 3];
      let vy = vPos.array[i * 3 + 1];
      let vr = vPos.array[i * 3 + 2];
      
      angle += dt * (0.8 + bass * 1.5 + corr * 0.5);
      vy += dt * vortexVel[i * 3 + 1] * (1.0 + bass);
      vr += dt * 0.05 * Math.sin(time * 0.3 + i);
      
      if (vy > 10) { vy = -10; vr = 0.5 + Math.random() * 3; }
      if (vr > 5) vr = 0.5;
      
      vPos.array[i * 3] = Math.cos(angle) * vr;
      vPos.array[i * 3 + 1] = vy;
      vPos.array[i * 3 + 2] = Math.sin(angle) * vr;
    }
    vPos.needsUpdate = true;

    // --- Fog Color Cycling (psychedelic palette over time) ---
    if (time > 2.5 && time < LAND_TRANSITION_START) {
      const fogHue = (hueAccum * 0.3 + progress * 0.5) % 1;
      const fogTarget = new THREE.Color().setHSL(fogHue, 0.6 + corr * 0.3, 0.04 + bass * 0.02);
      scene.fog.color.lerp(fogTarget, 0.02);
    }

    // --- Land Scene Transition at 28:30 ---
    if (time >= LAND_TRANSITION_START && !landTransitioned) {
      landT = Math.min(1.0, (time - LAND_TRANSITION_START) / (LAND_TRANSITION_END - LAND_TRANSITION_START));
    }
    if (landT >= 1.0) landTransitioned = true;

    if (landT > 0) {
      landGroup.visible = true;
      const lt = landT;

      // Underwater elements fade out
      sea.visible = lt < 0.6;
      sea2.visible = lt < 0.5;
      sea3.visible = lt < 0.4;
      abyss.visible = lt < 0.7;
      abyss2.visible = lt < 0.6;
      bgParticles.visible = lt < 0.5;
      bubblePoints.visible = lt < 0.5;

      // Hide all effects during land scene
      floatingEyes.forEach(e => e.visible = false);
      tendrilConnectors.forEach(tc => { tc.line.visible = false; });
      lesions.forEach(m => m.visible = false);
      looseChunks.forEach(m => m.visible = false);
      drool.visible = false;
      mouthClosed.visible = false;
      mouthDeep.visible = false;
      rings.forEach(r => { r.active = false; r.mesh.visible = false; r.mesh.material.opacity = 0; });
      geoShapes.forEach(g => g.mesh.visible = false);
      beams.forEach(b => b.mesh.visible = false);
      sheets.forEach(s => s.mesh.visible = false);
      vortexPoints.visible = false;

      // Ground and sky fade in
      groundMat.opacity = lt;
      skyMat.opacity = lt;

      // Sky color transitions from dark to bright blue
      skyMat.color.setHSL(0.58, 0.55 + lt * 0.15, 0.15 + lt * 0.4);

      // Sunlight ramps up
      sunLight.intensity = lt * 2.8;
      ambientLand.intensity = lt * 0.8;

      // Camera transitions to diagonal-above view
      const targetCamPos = new THREE.Vector3(4, 7, 6);
      camera.position.lerp(targetCamPos, lt * 0.04);

      // Model repositions to lie on ground
      if (fbxModel) {
        const targetModelY = -0.2;
        fbxModel.position.y += (targetModelY - fbxModel.position.y) * lt * 0.04;
        fbxModel.position.x += (0 - fbxModel.position.x) * lt * 0.04;
        fbxModel.position.z += (0 - fbxModel.position.z) * lt * 0.04;
        // Model already horizontal from sinking (rotation.z = PI/2), keep it
      }

      // Look at the model on the ground
      const lookTarget = new THREE.Vector3(0, 0, 0);
      if (fbxModel) fbxModel.getWorldPosition(lookTarget);
      lookTarget.y += 0.3;
      camera.lookAt(lookTarget);

      // Fog clears to transparent bright
      scene.fog.color.lerp(new THREE.Color(0x88bbee), lt * 0.06);
      scene.fog.density = THREE.MathUtils.lerp(scene.fog.density, 0.012, lt * 0.04);

      // Lighting to sunny outdoor
      key.color.lerp(new THREE.Color(0xfff4d0), lt * 0.05);
      key.intensity = THREE.MathUtils.lerp(key.intensity, 1.8, lt * 0.04);
      fill.color.lerp(new THREE.Color(0x8899cc), lt * 0.05);
      fill.intensity = THREE.MathUtils.lerp(fill.intensity, 0.6, lt * 0.04);
      underLight.intensity = THREE.MathUtils.lerp(underLight.intensity, 0.0, lt * 0.06);

      // Reduce post-processing for clean outdoor look
      postUniforms.uTrailAmount.value *= (1.0 - lt * 0.95);
    }

    // --- Post-Processing Shader Intensity Ramp ---
    // Corruption-driven extra effects that grow over time
    postUniforms.uCorruption.value = Math.min(corr, 1.2) * (1.0 + progress * 0.5);

    // Set post uniforms
    postUniforms.uTime.value = time;
    postUniforms.uCorruption.value = Math.min(corr, 1.2);
    postUniforms.uBass.value = bass;
    postUniforms.uSurge.value = Math.min(surgeEnergy, 1.0);
    
    // Trail feedback amount rises irreversibly over time (burns screen details)
    const baseTrail = parseFloat(trailSlider.value) / 100;
    const dynamicTrail = THREE.MathUtils.lerp(baseTrail, 0.98, progress);
    postUniforms.uTrailAmount.value = dynamicTrail;
  }

  // --- Real-time Loop Execution ---
  const clock = new THREE.Clock(); 
  clock.start();
  
  let fpsFrames = 0, fpsT = performance.now();
  let tempFreqData = new Uint8Array(256); // Pre-allocated

  function animate() {
    requestAnimationFrame(animate);
    
    const dtRaw = Math.min(clock.getDelta(), 0.05);
    
    // Synchronize playTime with audio playback context
    if (audioEl && playbackActive) {
      playTime = audioEl.currentTime;
    } else if (playbackActive) {
      playTime += dtRaw;
    }
    
    const t = playTime;
    const dt = playbackActive ? dtRaw : 0;

    // Gather real-time audio analysis
    if (analyser) {
      analyser.getByteFrequencyData(tempFreqData);
    } else {
      tempFreqData.fill(0);
    }

    // Update animation mixer
    if (mixer && playbackActive) {
      mixer.update(dtRaw);
    }

    // Render frame
    drawFrame(t, dt, tempFreqData);

    // Update HUD readouts
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    timeValEl.textContent = `${m}:${String(s).padStart(2,'0')}`;
    
    // Perform feedback rendering ping-pong swap
    renderer.setRenderTarget(sceneRT);
    renderer.clear();
    renderer.render(scene, camera);

    postUniforms.tDiffuse.value = sceneRT.texture;
    postUniforms.tPrevFrame.value = rt2.texture; // feedback buffer

    renderer.setRenderTarget(rt1);
    renderer.clear();
    renderer.render(postScene, postCamera);

    // Present current post-processed frame to the screen
    renderer.setRenderTarget(null);
    renderer.clear();
    screenUniforms.tDiffuse.value = rt1.texture;
    renderer.render(screenScene, screenCamera);

    // Swap buffers
    let temp = rt1;
    rt1 = rt2;
    rt2 = temp;

    // Display FPS
    fpsFrames++;
    const now = performance.now();
    if (now - fpsT >= 500) {
      fpsValEl.textContent = (Math.round(fpsFrames * 1000 / (now - fpsT))) + ' fps';
      fpsT = now; 
      fpsFrames = 0;
    }
  }

  applyResolution();
  animate();
})();
</script>
</body>
</html>
