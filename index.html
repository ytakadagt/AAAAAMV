<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Dive — Altered Perception MV</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#030102;font-family:"Outfit",sans-serif;color:#e5d5d5;}
#stage{position:fixed;inset:0;}
canvas{display:block;}
#ui{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:10px;
  background:rgba(12,6,12,0.8);backdrop-filter:blur(14px);
  padding:14px 18px;border-radius:8px;
  border:1px solid rgba(100,100,255,0.15);
  box-shadow:0 10px 40px rgba(0,0,0,0.7);
  max-width:95vw;width:760px;z-index:10;
}
.ui-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:space-between;}
.ui-group{display:flex;gap:8px;align-items:center;}
button,label.btn{background:rgba(30,15,25,0.6);color:#e6e6f5;border:1px solid rgba(100,110,255,0.25);padding:7px 12px;border-radius:4px;font-size:12px;font-family:"Outfit",sans-serif;cursor:pointer;outline:none;}
button:hover{background:rgba(50,20,40,0.8);border-color:rgba(120,120,255,0.45);}
button.recording{background:rgba(20,20,180,0.85);color:#fff;border-color:#3b3bff;}
input[type=file]{display:none;}
.slidewrap{display:flex;flex-direction:column;color:#aaaaca;font-size:10px;align-items:flex-start;gap:4px;min-width:90px;}
.slidewrap span{font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-family:"Share Tech Mono",monospace;}
input[type=range]{width:100%;accent-color:#66c;background:rgba(255,255,255,0.07);height:4px;border-radius:2px;border:none;outline:none;}
#title{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#bababa;letter-spacing:.5em;font-size:14px;font-weight:300;text-transform:uppercase;z-index:10;text-shadow:0 0 10px rgba(100,100,255,0.2);}
#status{position:fixed;top:48px;left:50%;transform:translateX(-50%);color:#a0a0b0;font-size:11px;font-family:"Share Tech Mono",monospace;z-index:10;background:rgba(0,0,0,0.4);padding:4px 12px;border-radius:12px;}
#hud{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-family:"Share Tech Mono",monospace;font-size:11px;z-index:10;color:#b5b5c5;background:rgba(10,5,12,0.5);padding:8px 12px;border-radius:4px;}
.hud-item span{color:#8080ff;}
#recInfo{position:fixed;top:110px;right:20px;color:#8080ff;font-family:"Share Tech Mono",monospace;font-size:11px;z-index:10;text-align:right;background:rgba(5,5,20,0.7);padding:6px 10px;border-radius:4px;display:none;}
#recInfo a{color:#ccccff;text-decoration:underline;}
</style>
</head>
<body>
<div id="title">Dive — Altered Perception</div>
<div id="status">システム初期化中...</div>
<div id="hud">
  <div class="hud-item">浸食度: <span id="corruptVal">0%</span></div>
  <div class="hud-item">経過: <span id="timeVal">0:00</span> / <span id="durationVal">33:33</span></div>
  <div class="hud-item">画質: <span id="fpsVal">— fps</span></div>
</div>
<div id="recInfo"></div>
<div id="stage"></div>
<div id="ui">
  <div class="ui-row">
    <div class="ui-group">
      <label class="btn">音楽<input type="file" id="fileInput" accept="audio/*"></label>
      <button id="micBtn">マイク</button>
      <button id="playBtn" style="min-width:90px;font-weight:600;">再生 / 停止</button>
      <button id="resetBtn">リセット</button>
      <button id="recBtn">● 録画</button>
    </div>
  </div>
  <div class="ui-row">
    <div class="ui-group">
      <div class="slidewrap"><span>沈む速度 <small id="lblSink">30</small></span><input type="range" id="sinkSpeed" min="0" max="100" value="30"></div>
      <div class="slidewrap"><span>崩壊速度 <small id="lblCorr">50</small></span><input type="range" id="corruptSpeed" min="0" max="100" value="50"></div>
      <div class="slidewrap"><span>残像 <small id="lblTrail">70</small></span><input type="range" id="trailAmount" min="0" max="95" value="70"></div>
    </div>
  </div>
  <div class="ui-row" style="gap:8px;align-items:center;">
    <span id="seekTime" style="font-family:monospace;font-size:11px;min-width:42px;">0:00</span>
    <input type="range" id="seekBar" min="0" max="1000" value="0" style="flex:1;height:6px;cursor:pointer;">
    <span id="seekDur" style="font-family:monospace;font-size:11px;min-width:42px;text-align:right;">33:33</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.6.10/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script>
(function(){
const statusEl=document.getElementById('status');
const corruptValEl=document.getElementById('corruptVal');
const timeValEl=document.getElementById('timeVal');
const durationValEl=document.getElementById('durationVal');
const fpsValEl=document.getElementById('fpsVal');
const recInfo=document.getElementById('recInfo');
const playBtn=document.getElementById('playBtn');
const recBtn=document.getElementById('recBtn');
const resetBtn=document.getElementById('resetBtn');
const sinkSpeedSlider=document.getElementById('sinkSpeed');
const corruptSpeedSlider=document.getElementById('corruptSpeed');
const trailSlider=document.getElementById('trailAmount');
const seekBar=document.getElementById('seekBar');
const seekTimeEl=document.getElementById('seekTime');
const seekDurEl=document.getElementById('seekDur');
let isSeeking=false;
sinkSpeedSlider.oninput=()=>document.getElementById('lblSink').textContent=sinkSpeedSlider.value;
corruptSpeedSlider.oninput=()=>document.getElementById('lblCorr').textContent=corruptSpeedSlider.value;
trailSlider.oninput=()=>document.getElementById('lblTrail').textContent=trailSlider.value;

seekBar.addEventListener('mousedown',()=>{isSeeking=true;});
seekBar.addEventListener('touchstart',()=>{isSeeking=true;});
seekBar.addEventListener('input',()=>{
  const t=(seekBar.value/1000)*trackDuration;
  if(audioEl&&isFinite(audioEl.duration))audioEl.currentTime=t;
  playTime=t;
  seekTimeEl.textContent=formatTime(t);
});
seekBar.addEventListener('mouseup',()=>{isSeeking=false;});
seekBar.addEventListener('touchend',()=>{isSeeking=false;});

function formatTime(t){const m=Math.floor(t/60);const s=Math.floor(t%60);return m+':'+String(s).padStart(2,'0');}
function updateSeekBar(t){if(isSeeking)return;seekBar.value=Math.round(Math.min(1,t/Math.max(trackDuration,1))*1000);seekTimeEl.textContent=formatTime(t);}

// --- Scene ---
const stage=document.getElementById('stage');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a0a14,0.06);

const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,120);
camera.position.set(0,6,8);

const renderer=new THREE.WebGLRenderer({antialias:false,alpha:false,preserveDrawingBuffer:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
renderer.setSize(window.innerWidth,window.innerHeight);
stage.appendChild(renderer.domElement);

// --- Post-processing (single pass, no ping-pong) ---
let rtW=Math.max(64,window.innerWidth);
let rtH=Math.max(64,window.innerHeight);
let sceneRT=new THREE.WebGLRenderTarget(rtW,rtH,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});
let prevRT=new THREE.WebGLRenderTarget(rtW,rtH,{minFilter:THREE.LinearFilter,magFilter:THREE.LinearFilter});

const postScene=new THREE.Scene();
const postCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const postUniforms={
  tDiffuse:{value:null},tPrev:{value:null},
  uRes:{value:new THREE.Vector2(rtW,rtH)},
  uTime:{value:0},uCorr:{value:0},uBass:{value:0},uSurge:{value:0},
  uTrail:{value:0.7}
};
const postMat=new THREE.ShaderMaterial({
  uniforms:postUniforms,
  vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.0,1.0);}',
  fragmentShader:`
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D tDiffuse;uniform sampler2D tPrev;
  uniform vec2 uRes;uniform float uTime,uCorr,uBass,uSurge,uTrail;
  float hash(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
  vec3 rgb2hsv(vec3 c){vec4 K=vec4(0.,-1./3.,2./3.,-1.);vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));float d=q.x-min(q.w,q.y);return vec3(abs(q.z+(q.w-q.y)/(6.*d+1e-10)),d/(q.x+1e-10),q.x);}
  vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}
  void main(){
    vec2 uv=vUv;float corr=clamp(uCorr,0.,1.2);
    vec2 c=uv-0.5;uv+=c*dot(c,c)*0.12*(corr+uSurge*1.5);
    vec2 w=vec2(sin(uv.y*7.+uTime*.7),cos(uv.x*6.+uTime*.5))*0.002*corr;uv+=w;
    vec3 col=texture2D(tDiffuse,uv).rgb;
    vec2 d=uv-0.5;float ab=0.001+corr*0.004+uBass*0.003;
    col.r=texture2D(tDiffuse,uv-d*ab).r;col.b=texture2D(tDiffuse,uv+d*ab).b;
    vec2 pv=vUv;vec2 pd=pv-0.5;float th=0.002*(1.+uBass*2.);
    vec2 rd=vec2(pd.x*cos(th)-pd.y*sin(th),pd.x*sin(th)+pd.y*cos(th));
    pv=0.5+rd*0.995;vec3 prev=texture2D(tPrev,pv).rgb;
    col=mix(col,prev,clamp(uTrail*(0.7+uBass*0.15),0.,0.97));
    vec3 hsv=rgb2hsv(col);hsv.x=fract(hsv.x+uTime*0.02*corr+uSurge*0.03);
    hsv.y=mix(hsv.y*0.4,min(hsv.y*1.8,1.),corr);col=hsv2rgb(hsv);
    float bloom=hash(floor(uv*6.)+floor(uTime*0.3));bloom=smoothstep(0.6,0.95,bloom);
    col+=vec3(0.02,0.08,0.45)*bloom*corr*(0.2+uBass*0.5)*0.5;
    float vig=smoothstep(0.95,0.2,length(uv-0.5));col*=mix(vig,1.,0.5)*mix(1.,0.78,corr*0.3);
    float grain=hash(uv*uRes+uTime*50.)-0.5;col+=grain*mix(0.015,0.06,corr);
    float drop=step(0.997-corr*0.003,hash(floor(uv*180.)+floor(uTime*12.)));col*=1.-drop*0.8;
    gl_FragColor=vec4(clamp(col,0.,1.),1.);
  }`
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),postMat));

const screenScene=new THREE.Scene();
const screenCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const screenUniforms={tDiffuse:{value:null}};
const screenMat=new THREE.ShaderMaterial({
  uniforms:screenUniforms,
  vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.,1.);}',
  fragmentShader:'precision highp float;varying vec2 vUv;uniform sampler2D tDiffuse;void main(){gl_FragColor=texture2D(tDiffuse,vUv);}'
});
screenScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),screenMat));

function applyResolution(){
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setPixelRatio(1);renderer.setSize(window.innerWidth,window.innerHeight,true);
  rtW=window.innerWidth;rtH=window.innerHeight;
  sceneRT.setSize(rtW,rtH);prevRT.setSize(rtW,rtH);
  postUniforms.uRes.value.set(rtW,rtH);
}
window.addEventListener('resize',applyResolution);

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x282840,0.8));
const key=new THREE.PointLight(0x7090c0,1.3,30);key.position.set(3,5,4);scene.add(key);
const fill=new THREE.PointLight(0x3a4565,0.8,30);fill.position.set(-4,-1,3);scene.add(fill);
const underLight=new THREE.PointLight(0x14204a,1.0,18);underLight.position.set(0,-3,1);scene.add(underLight);

// --- Materials (no custom vertex shader for perf) ---
const skinMat=new THREE.MeshStandardMaterial({color:0x8a9ab5,roughness:0.75,metalness:0.05,emissive:0x0c0608,emissiveIntensity:0.12,flatShading:true});
const lesionMat=new THREE.MeshStandardMaterial({color:0x060c2e,roughness:0.45,metalness:0.1,emissive:0x061818,emissiveIntensity:0.7,flatShading:true});
const eyeWhiteMat=new THREE.MeshStandardMaterial({color:0xdae2a8,roughness:0.2,emissive:0x4f5228,emissiveIntensity:0.35,flatShading:true});
const eyePupilMat=new THREE.MeshStandardMaterial({color:0x000010,emissive:0x1144ff,emissiveIntensity:1.8,flatShading:true});

// --- FBX Model ---
let fbxModel=null,mixer=null;
const bonesMap={},defaultBonePositions={};
let tendrilConnectors=[];

const textureLoader=new THREE.TextureLoader();
const baseColorTex=textureLoader.load('ps2-psx-lowpoly-character/textures/Base_Color.png');
const bodyColorTex=textureLoader.load('ps2-psx-lowpoly-character/textures/Body_Base_color.png');
baseColorTex.minFilter=bodyColorTex.minFilter=THREE.LinearFilter;
baseColorTex.magFilter=bodyColorTex.magFilter=THREE.LinearFilter;

function mapBones(object){
  let hasBones=false;object.traverse(c=>{if(c.isBone)hasBones=true;});
  if(hasBones){object.traverse(c=>{if(!c.isBone)return;const n=c.name.toLowerCase();
    if(n.includes('head'))bonesMap.head=c;else if(n.includes('neck'))bonesMap.neck=c;
    else if(n.includes('hips')||n.includes('pelvis')||n.includes('root'))bonesMap.hips=c;
    else if(n.includes('spine2')||n.includes('chest')||n.includes('spine1'))bonesMap.chest=c;
    else if(n.includes('spine'))bonesMap.spine=c;
    else if(n.includes('leftarm')||n.includes('upperarm_l')||n.includes('uparm.l'))bonesMap.armL=c;
    else if(n.includes('rightarm')||n.includes('upperarm_r')||n.includes('uparm.r'))bonesMap.armR=c;
    else if(n.includes('leftforearm')||n.includes('forearm_l')||n.includes('forearm.l'))bonesMap.forearmL=c;
    else if(n.includes('rightforearm')||n.includes('forearm_r')||n.includes('forearm.r'))bonesMap.forearmR=c;
    else if(n.includes('lefthand')||n.includes('hand_l')||n.includes('hand.l'))bonesMap.handL=c;
    else if(n.includes('righthand')||n.includes('hand_r')||n.includes('hand.r'))bonesMap.handR=c;
    else if(n.includes('leftupleg')||n.includes('thigh_l')||n.includes('thigh.l'))bonesMap.thighL=c;
    else if(n.includes('rightupleg')||n.includes('thigh_r')||n.includes('thigh.r'))bonesMap.thighR=c;
    else if(n.includes('leftleg')||n.includes('calf_l')||n.includes('calf.l')||n.includes('shin.l'))bonesMap.shinL=c;
    else if(n.includes('rightleg')||n.includes('calf_r')||n.includes('calf.r')||n.includes('shin.r'))bonesMap.shinR=c;
    else if(n.includes('leftfoot')||n.includes('foot_l')||n.includes('foot.l'))bonesMap.footL=c;
    else if(n.includes('rightfoot')||n.includes('foot_r')||n.includes('foot.r'))bonesMap.footR=c;
  });}else{object.traverse(c=>{if(!c.isMesh)return;const n=c.name.toLowerCase();
    if(n.includes('head')||n.includes('face'))bonesMap.head=c;
    else if(n.includes('torso')||n.includes('chest')||n.includes('body')||n.includes('hips'))bonesMap.hips=c;
  });}
  console.log("Bones:",Object.keys(bonesMap));
}
function saveDefaults(){for(const k in bonesMap)if(bonesMap[k])defaultBonePositions[k]=bonesMap[k].position.clone();}

// Tendrils (simplified - fewer points, less math)
const _ta=new THREE.Vector3(),_tb=new THREE.Vector3(),_td=new THREE.Vector3(),_tt=new THREE.Vector3(),_tn=new THREE.Vector3(),_tbn=new THREE.Vector3(),_tp=new THREE.Vector3();
class Tendril{
  constructor(a,b){this.a=a;this.b=b;this.n=8;const pos=new Float32Array(this.n*3);
    this.line=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineBasicMaterial({color:0x2255ff,transparent:true,opacity:0,linewidth:1}));
    this.line.geometry.setAttribute('position',new THREE.BufferAttribute(pos,3));scene.add(this.line);this.seed=Math.random()*100;}
  update(t,bass,corr){
    this.a.getWorldPosition(_ta);this.b.getWorldPosition(_tb);
    const pa=this.line.geometry.attributes.position;
    _td.subVectors(_tb,_ta);const len=_td.length();if(len<0.01)return;
    _td.normalize();
    _tt.set(Math.abs(_td.y)<0.9?0:1,Math.abs(_td.y)<0.9?1:0,0);
    _tn.crossVectors(_td,_tt).normalize();_tbn.crossVectors(_td,_tn).normalize();
    for(let i=0;i<this.n;i++){
      const a=i/(this.n-1);_tp.lerpVectors(_ta,_tb,a);
      if(a>0&&a<1){const amp=(0.05+corr*0.12+bass*0.08)*Math.sin(a*Math.PI);
        const w=Math.sin(t*6+a*12+this.seed)*amp;const w2=Math.cos(t*5+a*12+this.seed)*amp;
        _tp.addScaledVector(_tn,w);_tp.addScaledVector(_tbn,w2);}
      pa.setXYZ(i,_tp.x,_tp.y,_tp.z);}
    pa.needsUpdate=true;
    this.line.material.opacity=(0.15+corr*0.7)*(0.5+bass*0.4);
    this.line.material.color.setHSL(0.6+Math.sin(t*2)*0.03,1,0.4+bass*0.15);
  }
}
function initTendrils(){
  tendrilConnectors.forEach(tc=>scene.remove(tc.line));tendrilConnectors=[];
  if(!fbxModel)return;
  [[bonesMap.hips,bonesMap.spine],[bonesMap.spine,bonesMap.chest],[bonesMap.chest,bonesMap.neck],[bonesMap.neck,bonesMap.head],
   [bonesMap.chest,bonesMap.armL],[bonesMap.armL,bonesMap.forearmL],[bonesMap.chest,bonesMap.armR],[bonesMap.armR,bonesMap.forearmR],
   [bonesMap.hips,bonesMap.thighL],[bonesMap.thighL,bonesMap.shinL],[bonesMap.hips,bonesMap.thighR],[bonesMap.thighR,bonesMap.shinR]
  ].forEach(([a,b])=>{if(a&&b)tendrilConnectors.push(new Tendril(a,b));});
}

const loader=new THREE.FBXLoader();
function loadModel(url){return new Promise((resolve,reject)=>{
  console.log("[Loader]",url);loader.load(url,fbx=>{
    let mc=0;fbx.traverse(c=>{if(c.isMesh)mc++;});
    const box=new THREE.Box3().setFromObject(fbx);const sz=new THREE.Vector3();box.getSize(sz);
    console.log("[Loader] meshes:",mc,"size:",sz.y.toFixed(2),"anims:",fbx.animations?fbx.animations.length:0);
    if(sz.y<=0||!isFinite(sz.y)){reject(new Error('bad bounds'));return;}
    resolve(fbx);
  },xhr=>{statusEl.textContent='ロード中: '+Math.round(xhr.loaded/xhr.total*100)+'%';},e=>{console.error("[Loader]",e);reject(e);});
});}

function setupModel(fbx){
  fbxModel=fbx;
  const box=new THREE.Box3().setFromObject(fbx);const sz=new THREE.Vector3();box.getSize(sz);
  if(sz.y>0)fbx.scale.setScalar(1.6/sz.y);
  fbx.position.set(0,3,0);fbx.rotation.y=Math.PI;scene.add(fbx);
  mapBones(fbx);saveDefaults();
  fbx.traverse(child=>{
    if(!child.isMesh)return;
    const om=child.material;let hasTex=false;
    if(om){const ms=Array.isArray(om)?om:[om];hasTex=ms.some(m=>m.map);}
    if(!hasTex){
      const n=child.name.toLowerCase();const mn=om?(Array.isArray(om)?om[0].name.toLowerCase():om.name.toLowerCase()):'';
      let tex=bodyColorTex;
      if(n.includes('head')||n.includes('face')||n.includes('hair')||n.includes('eye')||mn.includes('head')||mn.includes('face'))tex=baseColorTex;
      child.material=new THREE.MeshStandardMaterial({map:tex,roughness:0.82,metalness:0.05,flatShading:true,emissive:0x0c0608,emissiveIntensity:0.12,side:THREE.DoubleSide});
    }else{const ms=Array.isArray(om)?om:[om];ms.forEach(m=>{m.flatShading=true;m.side=THREE.DoubleSide;m.emissive=new THREE.Color(0x0c0608);m.emissiveIntensity=0.12;});}
  });
  initTendrils();
  if(fbx.animations&&fbx.animations.length>0){mixer=new THREE.AnimationMixer(fbx);mixer.clipAction(fbx.animations[0]).play();statusEl.textContent="モデル＆アニメーション読込完了";}
  else statusEl.textContent="モデル読込完了";
}
loadModel('Swimming.fbx').catch(()=>loadModel('ps2-psx-lowpoly-character/source/ACharacter.fbx')).then(setupModel).catch(e=>{
  console.error("All models failed",e);statusEl.textContent="モデル読込失敗";
  fbxModel=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.6,0.5),new THREE.MeshStandardMaterial({color:0x8a9ab5,flatShading:true,emissive:0x0c0608,emissiveIntensity:0.3}));
  fbxModel.position.set(0,3,0);scene.add(fbxModel);
});

// --- Floating Eyes (reduced count) ---
const MAX_EYES=6;
const floatingEyes=[];
for(let i=0;i<MAX_EYES;i++){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.07,0.07,0.07),eyeWhiteMat));
  const pupil=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.015),eyePupilMat);pupil.position.z=0.036;g.add(pupil);
  scene.add(g);
  g.userData={sx:Math.random()*200,sy:Math.random()*200,r:1.3+Math.random()*2,sp:0.35+Math.random()*0.35};

// --- Onset Detection ---
let prevSpec=new Float32Array(256);
let smoothBass=0,smoothMid=0,smoothTreble=0;
let onsetBass=0,onsetMid=0,onsetTreble=0,onsetAny=0;
let surgeEnergy=0;
let hueAccum=0,corruptionRaw=0,splashTriggered=false;

function getLevels(fd){
  if(!fd)return{bass:0,mid:0,treble:0,onsetBass:0,onsetMid:0,onsetTreble:0,onsetAny:0};
  const n=fd.length;const bEnd=Math.floor(n*.1),mEnd=Math.floor(n*.45);
  let bass=0,mid=0,treble=0;
  for(let i=0;i<bEnd;i++)bass+=fd[i];bass/=bEnd*255;
  for(let i=bEnd;i<mEnd;i++)mid+=fd[i];mid/=(mEnd-bEnd)*255;
  for(let i=mEnd;i<n;i++)treble+=fd[i];treble/=(n-mEnd)*255;
  // Expand compressed audio
  bass=Math.pow(Math.max(0,(bass-0.25)/0.75),2.0);
  mid=Math.pow(Math.max(0,(mid-0.25)/0.75),2.2);
  treble=Math.pow(Math.max(0,(treble-0.22)/0.78),2.4);
  smoothBass+=(bass-smoothBass)*0.12;smoothMid+=(mid-smoothMid)*0.12;smoothTreble+=(treble-smoothTreble)*0.12;
  // Spectral flux (simple, fast)
  let flux=0,fb=0,fm=0,ft=0;
  const bs=n/256;
  for(let i=0;i<256;i++){const bi=Math.min(Math.floor(i*bs),n-1);const c=fd[bi]/255;const p=prevSpec[i];const d=c-p;prevSpec[i]=c;
    if(d>0){flux+=d*d;if(i<20)fb+=d;else if(i<115)fm+=d;else ft+=d;}}
  flux=Math.sqrt(flux)*2;
  const threshold=0.02;
  const ob=fb>threshold?fb-threshold:0;const om=fm>threshold?fm-threshold:0;const ot=ft>threshold?ft-threshold:0;
  onsetBass=Math.max(ob*5,onsetBass*0.85);
  onsetMid=Math.max(om*4,onsetMid*0.82);
  onsetTreble=Math.max(ot*3.5,onsetTreble*0.8);
  onsetAny=Math.max(flux*0.8,onsetAny*0.88);
  return{bass:smoothBass,mid:smoothMid,treble:smoothTreble,onsetBass,onsetMid,onsetTreble,onsetAny};
}

async function autoLoad(){

// --- Draw Frame ---
const _lookAt=new THREE.Vector3();
function drawFrame(time,dt,fd){
  const L=getLevels(fd);
  const energy=(L.bass+L.mid+L.treble)/3;

  surgeEnergy=Math.max(L.onsetAny,surgeEnergy-dt*2);
  const progress=getProgress(time);
  const variety=Math.sin(progress*Math.PI*5)*0.5+0.5;
  const rateMul=corruptSpeedSlider.value/50;
  corruptionRaw+=dt*(baseRate*rateMul*0.85+energy*0.006+L.onsetAny*0.008);
  const corr=Math.min(corruptionRaw,1.2);
  corruptValEl.textContent=Math.round(Math.min(corr,1)*100)+'%';
  hueAccum+=dt*0.04*(0.5+variety*0.8)+L.onsetAny*0.002;

  const fogA=new THREE.Color(0x0a0a14);
  const fogB=new THREE.Color(0x050108);

  // Track model
  if(fbxModel){
    if(bonesMap.hips)bonesMap.hips.getWorldPosition(_lookAt);else fbxModel.getWorldPosition(_lookAt);
    _lookAt.y+=0.42;
  }else _lookAt.set(0,3,0);

  // Camera: nearly static
  if(time<2.5){
    const r=time/2.5;camera.position.y=35-Math.pow(r,2)*29;camera.position.x=0;camera.position.z=0.1;
    camera.lookAt(_lookAt);scene.fog.color.copy(fogA);scene.fog.density=0.06;splashTriggered=false;bMat.opacity=0;
  }else{
    if(!splashTriggered){triggerSplash();splashTriggered=true;surgeEnergy=1;}
    const ut=time-2.5;
    // Fixed camera position after dive
    const tgtY=6-Math.min(ut*0.35,6);
    camera.position.y+=(tgtY-camera.position.y)*0.03;
    camera.position.x*=0.98;camera.position.z+=(8-camera.position.z)*0.03;
    camera.lookAt(_lookAt);
    scene.fog.color.copy(fogA).lerp(fogB,Math.min(ut*0.4,1));
    scene.fog.density=0.06+Math.min(corr,1)*0.015;
  }

  camera.fov=50+surgeEnergy*1.2;camera.updateProjectionMatrix();

  // Lighting
  key.color.setHSL(THREE.MathUtils.lerp(0.58,hueAccum%1,Math.min(corr,1)),0.5,0.55);
  fill.color.setHSL(THREE.MathUtils.lerp(0.52,(hueAccum+0.5)%1,Math.min(corr,1)),0.4,0.4);
  key.intensity=1.1+L.bass*1.2+Math.min(corr,1)*0.8+surgeEnergy*0.8+L.onsetBass*1.0;
  fill.intensity=0.8+L.mid*0.8+L.onsetMid*0.6;
  underLight.intensity=0.5+corr*1.2+L.bass*0.4+surgeEnergy*0.5;

  // Sea
  seaUniforms.uTime.value=time;seaUniforms.uBass.value=L.bass;seaUniforms.uMid.value=L.mid;seaUniforms.uCorr.value=Math.min(corr,1);

  // Model color
  skinMat.emissive.setHSL(0.6,1,progress*0.3+L.bass*0.1+L.onsetBass*0.08);
  skinMat.emissiveIntensity=0.1+progress*1.2+L.bass*0.3+L.onsetAny*0.3;

  // Model sinking & bone separation
  if(fbxModel&&!landDone){
    const sinkSpeed=sinkSpeedSlider.value/1000;
    fbxModel.position.y-=dt*(sinkSpeed*4.5)*(1+L.bass*0.8);
    fbxModel.rotation.z=Math.PI/2;
    if(L.onsetBass>0.3){fbxModel.position.x+=(Math.random()-0.5)*L.onsetBass*0.04;}
    const sep=progress*1.4;
    for(const k in bonesMap){
      const bone=bonesMap[k],def=defaultBonePositions[k];if(!bone||!def)continue;
      const amt=sep*0.5+corr*0.12+L.bass*0.06+L.onsetBass*0.08;
      let ox=0,oy=0;
      if(k==='head')oy=amt*1.6;else if(k==='neck')oy=amt*0.8;
      else if(k==='armL')ox=-amt*1.2;else if(k==='armR')ox=amt*1.2;
      else if(k==='forearmL')ox=-amt*1.5;else if(k==='forearmR')ox=amt*1.5;
      else if(k==='handL')ox=-amt*1.8;else if(k==='handR')ox=amt*1.8;
      else if(k==='thighL'){ox=-amt*0.8;oy=-amt*0.8;}else if(k==='thighR'){ox=amt*0.8;oy=-amt*0.8;}
      else if(k==='shinL'||k==='shinR')oy=-amt*1.2;
      else if(k==='footL'||k==='footR')oy=-amt*1.5;
      bone.position.set(def.x+ox,def.y+oy,def.z);
    }
  }

  // Tendrils
  tendrilConnectors.forEach(tc=>tc.update(time,L.bass,corr));

  // Eyes
  const eyeCount=Math.max(3,Math.floor(progress*MAX_EYES));
  floatingEyes.forEach((eye,i)=>{
    if(i>=eyeCount){eye.visible=false;return;}
    eye.visible=true;eye.scale.setScalar(Math.min(1,(progress*MAX_EYES-i)));
    const ud=eye.userData,th=time*ud.sp+ud.sx,ph=Math.sin(time*0.4+ud.sy)*1.1;
    const hp=fbxModel?new THREE.Vector3():new THREE.Vector3(0,3,0);
    if(fbxModel)fbxModel.getWorldPosition(hp);
    const r=ud.r*(1+L.bass*0.3)*(0.9+progress*0.4);
    eye.position.set(hp.x+r*Math.sin(th)*Math.cos(ph),hp.y+r*Math.sin(th)*Math.sin(ph),hp.z+r*Math.cos(th));
    eye.lookAt(camera.position);eye.children[1].material.emissiveIntensity=1+L.bass*1.2+L.onsetMid*0.8;
  });

  // Lesions
  const lEmerge=THREE.MathUtils.smoothstep(corr,0.12,0.55);
  const hp2=new THREE.Vector3();if(bonesMap.hips)bonesMap.hips.getWorldPosition(hp2);else if(fbxModel)fbxModel.getWorldPosition(hp2);else hp2.set(0,3,0);
  lesions.forEach(l=>{const ph=l.ph+time*0.7;l.mesh.scale.setScalar(lEmerge*(1+Math.sin(ph)*0.15*(0.3+corr)+L.onsetMid*0.2));
    l.mesh.position.set(hp2.x+Math.sin(ph)*0.25,hp2.y+Math.cos(ph*0.8)*0.25,hp2.z+Math.sin(ph*0.4)*0.25);l.mesh.visible=lEmerge>0.01;});
  const cEmerge=THREE.MathUtils.smoothstep(corr,0.05,0.45);
  chunks.forEach(c=>{const ph=c.ph+time*0.5;c.mesh.position.y+=0.015*Math.sin(ph)*(1+corr)*cEmerge;
    c.mesh.rotation.x+=0.01*(1+corr);c.mesh.rotation.y+=0.013*(1+corr);
    c.mesh.scale.setScalar(cEmerge*(1+corr*0.3));c.mesh.visible=cEmerge>0.01;});

  // BG particles
  const pa=pGeo.attributes.position;
  for(let i=0;i<PCOUNT;i++){let y=pa.array[i*3+1];y+=0.016*pSpd[i]*(1+L.treble*0.8);if(y>16)y=-16;pa.array[i*3+1]=y;}
  pa.needsUpdate=true;
  pMat.color.setHSL(THREE.MathUtils.lerp(0.06,hueAccum%1,Math.min(corr,1)),0.5,0.55);
  pMat.opacity=0.3+Math.min(corr,1)*0.3+L.treble*0.1+surgeEnergy*0.1+L.onsetTreble*0.15;

  // Bubbles
  if(splashTriggered&&bMat.opacity>0.01){
    const bpa=bubbles.geometry.attributes.position;
    for(let i=0;i<BCOUNT;i++){let bx=bpa.getX(i),by=bpa.getY(i),bz=bpa.getZ(i);
      if(by>-50){bx+=bVel[i*3]*dt;by+=bVel[i*3+1]*dt;bz+=bVel[i*3+2]*dt;bVel[i*3+1]-=dt*9.8;bpa.setXYZ(i,bx,by,bz);}}
    bpa.needsUpdate=true;bMat.opacity-=dt*0.12;
  }

  // Rings
  if(L.onsetBass>0.3&&time-lastRingT>0.2)triggerRing();
  rings.forEach(r=>{if(r.active){r.scale+=dt*5*(1+L.bass*1.5);r.mesh.scale.setScalar(r.scale);r.mesh.material.opacity=Math.max(0,0.6-r.scale*0.07)*Math.min(corr+0.1,1);if(r.scale>10){r.active=false;r.mesh.visible=false;}}});

  // Vortex
  vMat.opacity=THREE.MathUtils.smoothstep(corr,0.05,0.4)*0.5*(0.3+L.bass*0.4+surgeEnergy*0.2+L.onsetMid*0.3);
  vMat.color.setHSL((hueAccum*1.3)%1,0.8,0.5);
  const vp=vortex.geometry.attributes.position;
  for(let i=0;i<VC;i++){let a=vp.array[i*3],vy=vp.array[i*3+1],vr=vp.array[i*3+2];
    a+=dt*(0.6+L.bass*1+corr*0.3+L.onsetMid*1.5);vy+=dt*vVel[i*3+1]*(0.8+L.bass);
    if(vy>10){vy=-10;vr=0.5+Math.random()*3;}if(vr>5)vr=0.5;
    vp.array[i*3]=Math.cos(a)*vr;vp.array[i*3+1]=vy;vp.array[i*3+2]=Math.sin(a)*vr;}
  vp.needsUpdate=true;

  // Land transition
  if(time>=LAND_START&&!landDone)landT=Math.min(1,(time-LAND_START)/(LAND_END-LAND_START));
  if(landT>=1)landDone=true;
  if(landT>0){
    landGroup.visible=true;
    sea.visible=landT<0.6;sea2.visible=landT<0.5;abyss1.visible=landT<0.7;abyss2.visible=landT<0.6;
    bgParts.visible=landT<0.5;bubbles.visible=landT<0.5;
    floatingEyes.forEach(e=>e.visible=false);tendrilConnectors.forEach(tc=>{tc.line.visible=false;});
    lesions.forEach(l=>l.mesh.visible=false);chunks.forEach(c=>c.mesh.visible=false);
    rings.forEach(r=>{r.active=false;r.mesh.visible=false;});vortex.visible=false;
    groundMat2.opacity=landT;skyMat.opacity=landT;
    skyMat.color.setHSL(0.58,0.55+landT*0.15,0.15+landT*0.4);
    sunLight.intensity=landT*2.5;ambLand.intensity=landT*0.7;
    const tc=new THREE.Vector3(4,7,6);camera.position.lerp(tc,landT*0.04);
    if(fbxModel){fbxModel.position.y+=(-0.2-fbxModel.position.y)*landT*0.03;fbxModel.position.x*=(1-landT*0.03);fbxModel.position.z*=(1-landT*0.03);}
    const lt=new THREE.Vector3(0,0,0);if(fbxModel)fbxModel.getWorldPosition(lt);lt.y+=0.3;camera.lookAt(lt);
    scene.fog.color.lerp(new THREE.Color(0x88bbee),landT*0.05);scene.fog.density=Math.max(0.012,scene.fog.density*(1-landT*0.03));
    key.color.lerp(new THREE.Color(0xfff4d0),landT*0.04);fill.color.lerp(new THREE.Color(0x8899cc),landT*0.04);
    key.intensity=THREE.MathUtils.lerp(key.intensity,1.5,landT*0.03);
    underLight.intensity*=1-landT*0.05;
    postUniforms.uTrail.value*=1-landT*0.9;
  }

  // Post uniforms
  postUniforms.uTime.value=time;postUniforms.uCorr.value=Math.min(corr,1.2)+L.onsetAny*0.2;
  postUniforms.uBass.value=L.bass+L.onsetBass*0.4;postUniforms.uSurge.value=Math.min(surgeEnergy,1);
  postUniforms.uTrail.value=parseFloat(trailSlider.value)/100*(1-progress*0.3);
  if(landDone)postUniforms.uTrail.value*=0.05;
}

function getProgress(t){if(audioEl&&isFinite(audioEl.duration)&&audioEl.duration>0)return Math.min(1,t/audioEl.duration);return Math.min(1,t/2013);}

// --- Main Loop ---
const clock=new THREE.Clock();clock.start();
let fpsCount=0,fpsT=performance.now();
const tmpFd=new Uint8Array(1024);

function animate(){
  requestAnimationFrame(animate);
  const dtRaw=Math.min(clock.getDelta(),0.05);
  if(audioEl&&playbackActive)playTime=audioEl.currentTime;else if(playbackActive)playTime+=dtRaw;
  const t=playTime,dt=playbackActive?dtRaw:0;
  if(analyser)analyser.getByteFrequencyData(tmpFd);else tmpFd.fill(0);
  if(mixer&&playbackActive)mixer.update(dtRaw);
  drawFrame(t,dt,tmpFd);
  updateSeekBar(t);

  // Render: scene -> post -> screen (2 passes instead of 3)
  renderer.setRenderTarget(sceneRT);renderer.clear();renderer.render(scene,camera);
  postUniforms.tDiffuse.value=sceneRT.texture;postUniforms.tPrev.value=prevRT.texture;
  renderer.setRenderTarget(prevRT);renderer.clear();renderer.render(postScene,postCam);
  renderer.setRenderTarget(null);renderer.clear();
  screenUniforms.tDiffuse.value=prevRT.texture;renderer.render(screenScene,screenCam);

  fpsCount++;const now=performance.now();
  if(now-fpsT>=500){fpsValEl.textContent=Math.round(fpsCount*1000/(now-fpsT))+' fps';fpsT=now;fpsCount=0;}
}

applyResolution();animate();
})();
</script>
